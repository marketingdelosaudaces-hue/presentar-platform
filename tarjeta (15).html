<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PresentAR</title>
<link rel="manifest" id="pwa-manifest">
<meta name="theme-color" content="#e8192c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#e8192c;
  --bg:#e8e6e0;
  --surface:#fafaf9;
  --white:#fff;
  --black:#0a0a0a;
  --text:#0a0a0a;
  --text2:#5a5852;
  --text3:#7a7872;
  --text4:#9a9893;
  --border:#ececea;
  --border2:#e6e6e2;
  --gray-soft:#f4f4f2;
}
html,body{background:var(--bg)}
body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* LOADER */
.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
.loader.hide{opacity:0;pointer-events:none}
.loader-logo{font-size:24px;font-weight:600;color:var(--black);letter-spacing:-.5px;margin-bottom:16px}
.loader-logo span{color:var(--accent)}
.loader-bar{width:140px;height:2px;background:#d4d2cd;border-radius:2px;overflow:hidden}
.loader-fill{height:100%;background:var(--accent);border-radius:2px;animation:load 1s ease forwards}
@keyframes load{from{width:0}to{width:100%}}

.card{width:100%;max-width:430px;min-height:100vh;background:var(--surface);position:relative;overflow-x:hidden}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes storyPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.fade-section{animation:fadeUp .55s cubic-bezier(.22,1,.36,1) both}
.fade-1{animation-delay:.05s}
.fade-2{animation-delay:.12s}
.fade-3{animation-delay:.2s}
.fade-4{animation-delay:.28s}
.fade-5{animation-delay:.36s}
.fade-6{animation-delay:.44s}
.fade-7{animation-delay:.52s}

/* PORTADA con PARALLAX */
.cover{position:relative;height:240px;overflow:hidden;background:linear-gradient(180deg,#3a3a40 0%,#1a1a1c 100%)}
.cover-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;will-change:transform;transition:transform .05s linear}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 50%,rgba(0,0,0,.5) 100%)}
.cover-controls{position:absolute;top:14px;left:14px;right:14px;display:flex;align-items:center;justify-content:space-between;z-index:5}
.glass-btn{width:38px;height:38px;border-radius:14px;background:rgba(255,255,255,.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,transform .15s;text-decoration:none}
.glass-btn:hover{background:rgba(255,255,255,.25);transform:scale(1.05)}
.glass-btn svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cover-badge{position:absolute;bottom:14px;left:14px;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:50px;background:rgba(255,255,255,.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.18);z-index:5}
.cover-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 10px #22c55e;animation:pulse 1.6s ease infinite}
.cover-badge span{font-size:11px;color:#fff;font-weight:500;letter-spacing:.04em}

/* PROFILE CARD */
.profile-card{margin:-50px 14px 0;background:var(--surface);border-radius:24px;padding:18px;display:flex;flex-direction:column;border:1px solid var(--border);position:relative;z-index:6}
.profile-top{display:flex;align-items:flex-start;gap:14px;width:100%}
.profile-logo{width:78px;height:78px;border-radius:20px;background:var(--black);display:flex;align-items:center;justify-content:center;border:4px solid var(--surface);overflow:hidden;flex-shrink:0;transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.profile-logo:hover{transform:rotate(-3deg) scale(1.03)}
.profile-logo img{width:100%;height:100%;object-fit:cover}
.profile-logo span{font-size:24px;font-weight:600;color:#fff;letter-spacing:-.5px}
.profile-info{flex:1;min-width:0;padding-top:6px}
.profile-info-label{font-size:11px;color:var(--text4);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-info-name{font-size:18px;font-weight:600;color:var(--text);letter-spacing:-.3px;margin-top:2px;line-height:1.2}
.profile-tagline{font-size:12.5px;color:var(--text3);margin-top:6px;line-height:1.45;font-style:italic}
.profile-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);gap:10px;flex-wrap:wrap}
.profile-socials{display:flex;gap:7px}
.psoc{width:34px;height:34px;border-radius:11px;background:var(--gray-soft);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .2s}
.psoc:hover{background:var(--black);transform:translateY(-2px)}
.psoc:hover svg{stroke:#fff;fill:#fff}
.psoc svg{width:15px;height:15px;fill:var(--text);stroke:none;transition:fill .2s}
.psoc.outline svg{fill:none;stroke:var(--text);stroke-width:2;stroke-linecap:round}
.psoc.outline:hover svg{stroke:#fff;fill:none}
.profile-cert{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:50px;background:var(--gray-soft);font-size:11px;color:var(--text);font-weight:500}
.profile-cert svg{width:11px;height:11px;fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round}

/* STORIES tipo Instagram */
.stories-wrap{padding:18px 14px 4px}
.stories-row{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none}
.stories-row::-webkit-scrollbar{display:none}
.story-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;cursor:pointer}
.story-ring{width:62px;height:62px;border-radius:50%;padding:2.5px;transition:transform .2s}
.story-item:hover .story-ring{transform:scale(1.08)}
.story-ring.unread{background:linear-gradient(45deg,var(--accent),#ff5e7c,var(--accent))}
.story-ring.read{background:#d4d2cd}
.story-ring.new{background:linear-gradient(135deg,var(--accent),#ff5e7c);animation:storyPulse 3s ease infinite}
.story-inner{width:100%;height:100%;border-radius:50%;background:var(--surface);padding:2px}
.story-content{width:100%;height:100%;border-radius:50%;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center}
.story-name{font-size:10px;color:var(--text);font-weight:500;max-width:64px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.story-ring.read+.story-name{color:var(--text4)}

/* SALUDO */
.greeting{padding:14px 14px 12px}
.greet-hi{font-size:30px;font-weight:500;color:var(--text);letter-spacing:-.8px;line-height:1.05}
.greet-em{font-style:italic;color:var(--accent)}
.greet-sub{font-size:13px;color:var(--text3);margin-top:8px}

/* CARDS GRID — ACCIONES */
.cards-grid{padding:6px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.action-card{border-radius:22px;padding:18px;min-height:140px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;cursor:pointer;transition:transform .25s cubic-bezier(.22,1,.36,1),box-shadow .25s;border:none;font-family:inherit;text-align:left}
.action-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.12)}
.action-card:active{transform:translateY(-1px)}
.action-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15)}
.action-icon svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.action-title{font-size:16px;font-weight:600;letter-spacing:-.3px;line-height:1.15;color:#fff}
.action-sub{font-size:11px;opacity:.75;margin-top:3px;color:#fff}
.action-arrow{position:absolute;top:18px;right:18px;width:24px;height:24px;border-radius:8px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;transition:transform .25s}
.action-card:hover .action-arrow{transform:translate(2px,-2px)}
.action-arrow svg{width:12px;height:12px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}

/* SECTION CARD */
.section-card{margin:6px;background:var(--white);border-radius:22px;padding:18px}
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-eyebrow{font-size:10px;color:var(--text4);letter-spacing:.04em;text-transform:uppercase}
.sec-title{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-.2px;margin-top:1px}
.sec-title-row{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.sec-action{font-size:11px;color:var(--accent);font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:3px;text-decoration:none}
.sec-action svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}

.btn-icon-sq{width:30px;height:30px;border-radius:10px;background:var(--gray-soft);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:background .15s,transform .15s}
.btn-icon-sq:hover{background:#ececea;transform:scale(1.08)}
.btn-icon-sq svg{width:13px;height:13px;fill:none;stroke:var(--text);stroke-width:2;stroke-linecap:round}
.btn-icon-sq.dark{background:var(--black)}
.btn-icon-sq.dark svg{stroke:#fff}
.btn-icon-accent{width:32px;height:32px;border-radius:11px;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:transform .15s}
.btn-icon-accent:hover{transform:scale(1.08)}
.btn-icon-accent svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}

/* SERVICIOS GRID con IMÁGENES */
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.svc-card{border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s;position:relative;height:140px;text-decoration:none;border:none;padding:0;background:var(--gray-soft);font-family:inherit;display:block}
.svc-card:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(0,0,0,.1)}
.svc-img{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .4s cubic-bezier(.22,1,.36,1)}
.svc-card:hover .svc-img{transform:scale(1.08)}
.svc-overlay-grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 30%,rgba(0,0,0,.85) 100%)}
.svc-content{position:absolute;bottom:10px;left:12px;right:12px;color:#fff}
.svc-name-grid{font-size:13px;font-weight:600;letter-spacing:-.1px}
.svc-desc-grid{font-size:10px;opacity:.8;margin-top:2px}
.svc-badge{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:50px;background:rgba(255,255,255,.95);font-size:9px;font-weight:600;color:var(--text)}
.svc-icon-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3a3a40,#1a1a1c)}
.svc-icon-bg svg{width:42px;height:42px;fill:none;stroke:rgba(255,255,255,.4);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* GALERÍA */
.gallery-wrap{display:flex;gap:8px;overflow-x:auto;margin:0 -18px;padding:0 18px 4px;scrollbar-width:none}
.gallery-wrap::-webkit-scrollbar{display:none}
.gallery-card{width:160px;height:210px;border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .25s;position:relative;flex-shrink:0;background:var(--gray-soft)}
.gallery-card:hover{transform:scale(1.03)}
.gallery-img{position:absolute;inset:0;background-size:cover;background-position:center}
.gallery-grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.85))}
.gallery-content{position:absolute;bottom:10px;left:10px;right:10px;color:#fff}
.gallery-title{font-size:12px;font-weight:600;letter-spacing:-.1px}
.gallery-meta{font-size:9px;opacity:.7;margin-top:2px}
.gallery-tag{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:50px;font-size:9px;font-weight:600}
.gallery-pages{display:flex;gap:4px;justify-content:center;margin-top:12px}
.gp-dot{height:3px;border-radius:2px;background:#d4d2cd;transition:width .25s,background .25s}
.gp-dot.active{width:18px;background:var(--black)}
.gp-dot:not(.active){width:6px}

/* CALENDARIO */
.cal-nav{display:flex;gap:5px}
.days-row{display:flex;gap:4px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px;scrollbar-width:none}
.days-row::-webkit-scrollbar{display:none}
.day-cell{width:42px;height:50px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;background:transparent;animation:slideRight .35s ease both}
.day-cell:hover{background:var(--gray-soft)}
.day-cell.active{background:var(--accent)}
.day-cell.active .day-name{color:rgba(255,255,255,.7)}
.day-cell.active .day-num{color:#fff}
.day-name{font-size:10px;color:var(--text4);margin-bottom:2px;letter-spacing:.04em;text-transform:uppercase}
.day-num{font-size:16px;font-weight:500;color:var(--text)}
.slots-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.slot{padding:9px 6px;border-radius:11px;border:1px solid var(--border);font-size:12px;color:var(--text);text-align:center;cursor:pointer;font-weight:500;background:var(--white);transition:all .15s}
.slot:hover{background:var(--gray-soft);transform:scale(1.04)}
.slot.taken{color:#c4c2bd;text-decoration:line-through;cursor:not-allowed;background:var(--gray-soft)}
.slot.taken:hover{transform:none}
.slot.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-confirm{width:100%;margin-top:14px;padding:14px;background:var(--black);color:#fff;border:none;border-radius:14px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:opacity .15s,transform .15s}
.btn-confirm:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
.btn-confirm:disabled{opacity:.4;cursor:not-allowed}
.btn-confirm svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}

/* MAPA */
.map-box{background:var(--gray-soft);border-radius:14px;height:130px;position:relative;overflow:hidden}
.map-pill{position:absolute;bottom:8px;left:8px;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:50px;background:#fff;font-size:10px;color:var(--text);font-weight:500;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.map-pill svg{width:11px;height:11px;fill:none;stroke:var(--text);stroke-width:2;stroke-linecap:round}

/* CONTACTO */
.contact-list{display:flex;flex-direction:column}
.contact-row-mini{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.contact-row-mini:last-child{border-bottom:none}
.ci-mini{width:32px;height:32px;border-radius:10px;background:var(--gray-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci-mini svg{width:14px;height:14px;fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ci-lbl{font-size:10px;color:var(--text4);letter-spacing:.02em}
.ci-val{font-size:13px;color:var(--text);margin-top:1px;line-height:1.3;word-break:break-word}
.ci-val a{color:var(--text);text-decoration:none}

/* ABOUT */
.about-text-block{font-size:13px;color:var(--text2);line-height:1.65}

/* FORM */
.form-box{background:var(--white);border-radius:22px;padding:18px;margin:6px}
.form-field{width:100%;padding:12px 14px;background:var(--white);border:1px solid var(--border2);border-radius:12px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);margin-bottom:8px;outline:none;transition:border-color .15s}
.form-field:focus{border-color:var(--accent)}
.form-field::placeholder{color:var(--text4)}
.form-submit{width:100%;padding:13px;background:var(--black);color:#fff;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-top:4px;transition:opacity .15s}
.form-submit:hover{opacity:.88}

/* FIDELIZACIÓN — BENEFICIO */
.benefit-card{margin:6px;border-radius:24px;padding:0;overflow:hidden;position:relative;background:linear-gradient(135deg,var(--black) 0%,#1a1a1c 100%)}
.benefit-decor{position:absolute;width:220px;height:220px;border-radius:50%;background:var(--accent);opacity:.18;filter:blur(40px);top:-80px;right:-60px;pointer-events:none}
.benefit-decor2{position:absolute;width:160px;height:160px;border-radius:50%;background:var(--accent);opacity:.12;filter:blur(40px);bottom:-60px;left:-40px;pointer-events:none}
.benefit-inner{position:relative;z-index:2;padding:24px 22px}
.benefit-eyebrow{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:50px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);font-size:10px;color:#fff;letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:14px;backdrop-filter:blur(10px)}
.benefit-eyebrow svg{width:11px;height:11px;stroke:var(--accent);stroke-width:2.5}
.benefit-title{font-size:22px;font-weight:600;color:#fff;letter-spacing:-.5px;line-height:1.15;margin-bottom:6px}
.benefit-desc{font-size:13px;color:rgba(255,255,255,.7);line-height:1.55;margin-bottom:18px}
.benefit-code-wrap{background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.2);border-radius:14px;padding:18px;position:relative;overflow:hidden;transition:all .3s}
.benefit-code-wrap.revealed{background:rgba(255,255,255,.1);border-style:solid;border-color:var(--accent)}
.benefit-code-hidden{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer}
.benefit-code-hidden:hover .benefit-reveal-btn{transform:scale(1.02)}
.benefit-lock-icon{width:48px;height:48px;border-radius:14px;background:var(--accent);display:flex;align-items:center;justify-content:center;animation:pulse 2s ease infinite}
.benefit-lock-icon svg{width:22px;height:22px;stroke:#fff;stroke-width:2}
.benefit-reveal-btn{background:var(--white);color:var(--black);padding:11px 22px;border-radius:50px;font-size:13px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:transform .2s}
.benefit-reveal-btn svg{width:13px;height:13px;stroke:var(--black);stroke-width:2.5}
.benefit-hint{font-size:11px;color:rgba(255,255,255,.5);font-style:italic}
.benefit-code-shown{display:none;flex-direction:column;align-items:center;gap:12px;animation:fadeUp .5s ease both}
.benefit-code-shown.show{display:flex}
.benefit-code{font-family:'Inter',monospace;font-size:28px;font-weight:700;color:#fff;letter-spacing:4px;background:rgba(255,255,255,.08);padding:14px 28px;border-radius:12px;border:1px dashed rgba(255,255,255,.3)}
.benefit-copy-btn{background:var(--accent);color:#fff;padding:11px 22px;border-radius:50px;font-size:13px;font-weight:500;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .2s}
.benefit-copy-btn:hover{opacity:.9;transform:translateY(-1px)}
.benefit-copy-btn svg{width:13px;height:13px;stroke:#fff;stroke-width:2}

/* FOOTER */
.card-footer{padding:8px 14px 28px;text-align:center;font-size:10px;color:var(--text4);letter-spacing:.18em;font-weight:500}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--black);color:#fff;font-size:13px;padding:11px 22px;border-radius:100px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* STORY MODAL */
.story-modal{position:fixed;inset:0;background:#000;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center}
.story-modal.show{display:flex}
.story-modal-bar{position:absolute;top:12px;left:14px;right:14px;height:3px;display:flex;gap:4px;z-index:10}
.story-modal-bar div{flex:1;height:100%;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
.story-modal-bar div span{display:block;height:100%;background:#fff;width:0;transition:width 5s linear}
.story-modal-close{position:absolute;top:28px;right:14px;z-index:11;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}

async function loadCard() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/tarjetas?slug=eq.${slug}&activa=eq.true&select=*`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const cards = await res.json();
    if (!cards || !cards.length) {
      renderNotFound();
    } else {
      let links = [];
      try { links = JSON.parse(cards[0].links || '[]'); } catch {}
      renderCard(cards[0], links);
      registrarVisita(cards[0].id);
      initParallax();
      generatePWAManifest(cards[0]);
    }
  } catch(e) {
    renderNotFound();
  }
  setTimeout(() => {
    document.getElementById('loader').classList.add('hide');
    document.getElementById('card').style.display = 'block';
  }, 900);
}

function renderCard(d, links) {
  const color = d.color || '#e8192c';
  document.documentElement.style.setProperty('--accent', color);
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content', color);

  const ini = (d.nombre||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const waNum = (d.telefono||'').replace(/\D/g,'');
  const waLink = waNum ? `https://wa.me/${waNum}?text=Hola%20${encodeURIComponent(d.nombre||'')}%2C%20vi%20su%20tarjeta%20y%20quisiera%20consultar` : '#';
  const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${d.nombre||''}\nORG:${d.empresa||''}\nTITLE:${d.cargo||''}\nTEL;TYPE=CELL:${d.telefono||''}\nEMAIL:${d.email||''}\nURL:${d.web||''}\nADR;TYPE=WORK:;;${d.direccion||''};;;\nEND:VCARD`;
  window._vcard = vcard; window._cardData = d;

  const certs = d.certificaciones ? d.certificaciones.split(',').map(c=>c.trim()).filter(Boolean) : [];
  const activeLnks = links.filter(l=>l.active);

  const coverHtml = d.cover_url
    ? `<img class="cover-img" id="cover-img" src="${d.cover_url}" alt="">`
    : `<svg class="cover-img" id="cover-img" viewBox="0 0 430 240" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">

        <rect width="430" height="240" fill="url(#sky)"/>
        <g stroke="#3a3a40" stroke-width="1.5" fill="none" opacity=".6">
          <line x1="50" y1="90" x2="200" y2="90"/><line x1="50" y1="120" x2="200" y2="120"/><line x1="50" y1="150" x2="200" y2="150"/>
          <line x1="60" y1="90" x2="60" y2="240"/><line x1="100" y1="90" x2="100" y2="240"/><line x1="140" y1="90" x2="140" y2="240"/>
        </g>
        <rect x="240" y="80" width="60" height="160" fill="#1a1a1c"/>
        <rect x="290" y="100" width="80" height="140" fill="#0f0f10"/>
        <rect x="350" y="60" width="60" height="180" fill="#1a1a1c"/>
       </svg>`;

  const logoHtml = d.logo_url
    ? `<div class="profile-logo"><img src="${d.logo_url}" alt="${d.nombre}"></div>`
    : `<div class="profile-logo"><span>${ini}</span></div>`;

  const certPills = certs.slice(0,1).map(c => `<div class="profile-cert">${I.shield}${c}</div>`).join('');

  // STORIES — solo las que el admin haya configurado
  const storiesData = [
    d.cover_url ? {name: 'Obras', img: d.cover_url, read: false} : null,
    d.logo_url ? {name: 'Equipo', img: d.logo_url, read: false} : null,
    {name: 'Certif.', img: null, read: true, gradient: 'linear-gradient(135deg,#e8192c,#ff5e7c)'},
    {name: 'Premios', img: null, read: true, gradient: 'linear-gradient(135deg,#0a0a0a,#3a3a3a)'},
  ].filter(Boolean);

  const storiesHtml = storiesData.map((s, idx) => {
    const ringClass = s.read ? 'read' : 'unread';
    const bgStyle = s.img ? `background-image:url('${s.img}')` : `background:${s.gradient || '#2a2a2a'}`;
    return `<div class="story-item" onclick="openStory(${idx}, '${s.name}', '${s.img || ''}')">
      <div class="story-ring ${ringClass}"><div class="story-inner"><div class="story-content" style="${bgStyle}"></div></div></div>
      <div class="story-name">${s.name}</div>
    </div>`;
  }).join('');

  // SERVICIOS con imágenes (los primeros 4 active links que tengan imagen, o placeholders)
  const serviciosData = activeLnks.slice(0,4).map((l, i) => ({
    name: l.label,
    desc: l.url?.includes('.pdf') ? 'PDF descargable' : 'Más información',
    url: l.url,
    img: i === 0 && d.cover_url ? d.cover_url : null,

  }));

  // Si no hay suficientes links, mostrar tarjetas con ícono
  while (serviciosData.length < 4 && serviciosData.length < activeLnks.length + 4) {
    serviciosData.push({placeholder: true});
  }

  const serviciosHtml = serviciosData.length ? `

        <div>

            ? `<div class="svc-img" style="background-image:url('${s.img}')"></div>`
            : `<div class="svc-icon-bg">${I.build}</div>`;
          return `<a class="svc-card" href="${s.url}" target="_blank">
            ${img}
            <div class="svc-overlay-grad"></div>
            ${badge}
            <div class="svc-content">
              <div class="svc-name-grid">${s.name}</div>
              <div class="svc-desc-grid">${s.desc}</div>
            </div>
          </a>`;
        }).join('')}
      </div>
    </div>` : '';

  // GALERÍA — usar cover_url + más placeholders si hay

    d.cover_url ? {img: d.cover_url, title: 'Proyecto destacado', meta: d.direccion?.split(',')[0] || 'Argentina', tag: 'Top', tagColor: color} : null,
    {img: null, title: 'Obra industrial', meta: 'Bahía Blanca · 2025', tag: null},
    {img: null, title: 'Mantenimiento', meta: 'Plaza Huincul · 2024', tag: null},

  const galeriaHtml = galeriaItems.length ? `
    <div class="section-card fade-section fade-5">
      <div class="sec-header">
        <div>
          <div class="sec-eyebrow">PROYECTOS</div>
          <div class="sec-title">Trabajos realizados</div>
        </div>
        <div class="cal-nav">

        </div>
      </div>
      <div class="gallery-wrap" id="gallery">
        ${galeriaItems.map((g, i) => {
          const img = g.img
            ? `<div class="gallery-img" style="background-image:url('${g.img}')"></div>`

          return `<div class="gallery-card">

            <div class="gallery-content">

  const slotsHtml = ['09:00','10:00','11:00','12:00','14:00','15:00','16:00','17:00'].map((s,i) => {
    const taken = i === 1 || i === 6;
    return `<div class="slot ${taken?'taken':''}" onclick="if(!this.classList.contains('taken')) selectSlot(this)">${s}</div>`;
  }).join('');
  const monthName = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][new Date().getMonth()];
  const yearNum = new Date().getFullYear();

  // CONTACTO ROWS
  const infoRows = [
    d.telefono ? `<div class="contact-row-mini"><div class="ci-mini">${I.phone}</div><div><div class="ci-lbl">WhatsApp</div><div class="ci-val"><a href="${waLink}">${d.telefono}</a></div></div></div>` : '',
    d.email    ? `<div class="contact-row-mini"><div class="ci-mini">${I.mail}</div><div><div class="ci-lbl">Email</div><div class="ci-val"><a href="mailto:${d.email}">${d.email}</a></div></div></div>` : '',

  document.getElementById('card').innerHTML = `

            <span class="benefit-hint">Tocá para descubrirlo</span>

            <div style="font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.12em;text-transform:uppercase">Tu código</div>

            <button class="benefit-copy-btn" onclick="copyBenefitCode('${d.beneficio_codigo}')">${I.copy}Copiar código</button>

function generarDias(cantidad) {
  const result = [];
  const dayNames = ['DOM','LUN','MAR','MIE','JUE','VIE','SAB'];
  const today = new Date();
  let added = 0, offset = 0;
  while (added < cantidad) {
    const d = new Date(today);
    d.setDate(today.getDate() + offset);
    if (d.getDay() !== 0 && d.getDay() !== 6) {
      result.push({ name: dayNames[d.getDay()], num: d.getDate(), date: d.toISOString().split('T')[0] });
      added++;
    }
    offset++;
  }
  return result;
}

let selectedDayEl = null, selectedSlotEl = null;
function selectDay(el, idx) {
  if (selectedDayEl) selectedDayEl.classList.remove('active');
  el.classList.add('active');
  selectedDayEl = el;
  document.querySelectorAll('.slot.selected').forEach(s => s.classList.remove('selected'));
  selectedSlotEl = null;
  updateReserveLabel();
}
function selectSlot(el) {
  if (selectedSlotEl) selectedSlotEl.classList.remove('selected');
  el.classList.add('selected');
  selectedSlotEl = el;
  updateReserveLabel();
}
function updateReserveLabel() {
  const label = document.getElementById('reserve-label');
  const btn = document.getElementById('btn-reserve');
  if (selectedDayEl && selectedSlotEl) {
    const dayName = selectedDayEl.querySelector('.day-name').textContent;
    const dayNum = selectedDayEl.querySelector('.day-num').textContent;
    label.textContent = `Reservar ${dayName} ${dayNum} · ${selectedSlotEl.textContent}`;
    btn.disabled = false;
  } else {
    label.textContent = selectedDayEl ? 'Elegí un horario' : 'Elegí un día';
    btn.disabled = true;
  }
}
async function confirmReserva() {
  if (!selectedDayEl || !selectedSlotEl) { showToast('Elegí día y horario'); return; }
  const dayName = selectedDayEl.querySelector('.day-name').textContent;
  const dayNum = selectedDayEl.querySelector('.day-num').textContent;
  const hora = selectedSlotEl.textContent;
  const data = window._cardData;
  const waNum = (data?.telefono||'').replace(/\D/g,'');
  const msg = `Hola ${data?.nombre||''}! Quisiera reservar una reunión el ${dayName} ${dayNum} a las ${hora}. ¿Lo confirmamos?`;
  if (waNum) {
    window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`, '_blank');
    showToast('Te llevamos a WhatsApp para confirmar');
  } else {
    showToast(`Reserva: ${dayName} ${dayNum} · ${hora}`);
  }
}

function scrollGallery(dir) {
  const g = document.getElementById('gallery');
  if (g) g.scrollBy({ left: dir * 170, behavior: 'smooth' });
}

// PARALLAX
function initParallax() {
  const cover = document.getElementById('cover-img');
  if (!cover) return;
  const onScroll = () => {
    const y = window.scrollY;
    if (y < 400) cover.style.transform = `translate3d(0, ${y * 0.4}px, 0) scale(${1 + y * 0.0008})`;
  };
  window.addEventListener('scroll', onScroll, { passive: true });
}

// STORIES MODAL
function openStory(idx, name, img) {
  if (!img) { showToast('Story próximamente'); return; }
  const modal = document.getElementById('story-modal');
  document.getElementById('story-img').src = img;
  document.getElementById('story-title').textContent = name;
  document.getElementById('story-bars').innerHTML = '<div><span></span></div>';
  modal.classList.add('show');
  setTimeout(() => {
    const span = document.querySelector('#story-bars span');
    if (span) span.style.width = '100%';
  }, 50);
  setTimeout(closeStory, 5000);
}
function closeStory() {
  document.getElementById('story-modal').classList.remove('show');
}

// ADD TO HOME SCREEN
function generatePWAManifest(d) {
  const color = d.color || '#e8192c';
  const manifest = {
    name: d.nombre || 'PresentAR',
    short_name: (d.nombre || 'PresentAR').split(' ')[0],
    description: d.tagline || 'Tarjeta digital',
    start_url: window.location.href,
    display: 'standalone',
    background_color: '#fafaf9',
    theme_color: color,
    icons: d.logo_url ? [
      { src: d.logo_url, sizes: '192x192', type: 'image/png' },
      { src: d.logo_url, sizes: '512x512', type: 'image/png' }
    ] : []
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

function addToHomeScreen() {
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((res) => {
      if (res.outcome === 'accepted') showToast('✓ Agregado a tu pantalla principal');
      else showToast('Cancelado');
      deferredPrompt = null;
    });
  } else if (isIOS) {
    showToast('Tocá Compartir → "Agregar a pantalla inicio"');
  } else {
    showToast('Tocá menú del navegador → "Instalar app"');
  }
}

function renderNotFound() {
  document.getElementById('card').innerHTML = `
    <div class="not-found">
      <h2>Tarjeta no encontrada</h2>
      <p>No existe ninguna tarjeta con ese nombre.<br>Verificá la URL.</p>
    </div>`;
}

async function registrarVisita(id) {
  const disp = /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop';
  const tipo = window.location.search.includes('qr') ? 'qr' : 'web';
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/visitas`, {
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'},
      body:JSON.stringify({tarjeta_id:id,tipo,dispositivo:disp})
    });
  } catch(e) {}
}

async function submitForm(tarjetaId) {
  const n = document.getElementById('f-nombre').value.trim();
  const e = document.getElementById('f-empresa').value.trim();
  const m = document.getElementById('f-email').value.trim();
  const c = document.getElementById('f-celular').value.trim();
  if (!n || !m) { showToast('Completá nombre y email'); return; }
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/contactos`, {
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'},
      body:JSON.stringify({tarjeta_id:tarjetaId,nombre:n,empresa:e,email:m,celular:c,estado:'new'})
    });
    showToast('¡Gracias ' + n + '! Te contactamos pronto.');
    ['f-nombre','f-empresa','f-email','f-celular'].forEach(id => document.getElementById(id).value='');
  } catch(e) { showToast('¡Gracias ' + n + '!'); }
}

function saveVCard() {
  const blob = new Blob([window._vcard],{type:'text/vcard'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (window._cardData?.nombre||'contacto').replace(/\s+/g,'_') + '.vcf';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Contacto descargado');
}

function shareCard() {
  if (navigator.share) navigator.share({title:window._cardData?.nombre,url:window.location.href});
  else { navigator.clipboard?.writeText(window.location.href); showToast('Link copiado'); }
}

function revealBenefit() {
  const wrap = document.getElementById('benefit-wrap');
  const hidden = document.getElementById('benefit-hidden');
  const shown = document.getElementById('benefit-shown');
  if (!wrap) return;
  wrap.classList.add('revealed');
  hidden.style.display = 'none';
  shown.classList.add('show');
}

function copyBenefitCode(code) {
  navigator.clipboard?.writeText(code);
  showToast('✓ Código copiado: ' + code);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

loadCard();
</script>

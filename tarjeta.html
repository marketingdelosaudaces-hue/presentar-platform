<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PresentAR — Tarjeta Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#1a1a1a;--red:#e8192c;--white:#ffffff;
  --gray:#f5f5f5;--muted:#888;--border:#e4e4e4;
  --card-color:#e8192c;
}
body{background:#d0d0d0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;font-family:'Nunito',sans-serif;padding-bottom:80px}
.card{width:100%;max-width:430px;background:var(--white);min-height:100vh;animation:up .5s cubic-bezier(.22,1,.36,1) both;position:relative}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s}
.loading-screen.hide{opacity:0;pointer-events:none}
.loading-logo{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;color:white;margin-bottom:16px}
.loading-logo span{color:var(--red)}
.loading-bar{width:200px;height:3px;background:#333;border-radius:3px;overflow:hidden}
.loading-fill{height:100%;background:var(--red);border-radius:3px;animation:fill 1.2s ease forwards}
@keyframes fill{from{width:0}to{width:100%}}

/* COVER */
.cover{position:relative;height:210px;overflow:hidden;background:linear-gradient(135deg,#1a1a1a,#2d1010)}
.cover img{width:100%;height:100%;object-fit:cover;display:block}
.cover-default{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:64px}

/* AVATAR */
.avatar-wrap{display:flex;justify-content:center;margin-top:-52px;position:relative;z-index:10}
.avatar{width:104px;height:104px;border-radius:50%;border:4px solid white;background:#1a1a1a;object-fit:contain;padding:6px;box-shadow:0 6px 24px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;color:white}

/* IDENTITY */
.identity{text-align:center;padding:14px 24px 0}
.identity h1{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--black);letter-spacing:.04em;text-transform:uppercase}
.identity .role{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;letter-spacing:.1em;text-transform:uppercase}
.identity .tagline{font-size:13px;color:#555;font-weight:400;margin-top:10px;line-height:1.55;padding:0 8px;font-style:italic}

/* CERTS */
.certs{display:flex;justify-content:center;gap:8px;padding:14px 18px 0;flex-wrap:wrap}
.cert-badge{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--gray);border-radius:20px;font-size:10.5px;font-weight:700;color:var(--black);letter-spacing:.04em}
.cert-badge svg{width:12px;height:12px;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ACTIONS */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 18px 0}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 10px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;cursor:pointer;border:none;text-decoration:none;transition:transform .15s,opacity .15s}
.btn:hover{transform:translateY(-1px);opacity:.9}
.btn svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}
.btn-wa{color:white}
.btn-share{background:var(--black);color:white}

/* AGENDA */
.agenda-wrap{padding:10px 18px 0}
.btn-agenda{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:50px;color:white;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;letter-spacing:.05em;cursor:pointer;text-decoration:none;transition:opacity .2s,transform .15s}
.btn-agenda:hover{opacity:.9;transform:translateY(-1px)}
.btn-agenda svg{width:16px;height:16px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;flex-shrink:0}

/* SOCIALS */
.socials{display:flex;justify-content:center;gap:22px;padding:18px 18px 0}
.soc{width:44px;height:44px;border-radius:50%;background:var(--gray);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,transform .15s;text-decoration:none}
.soc:hover{background:var(--black);transform:translateY(-2px)}
.soc:hover svg{fill:white}
.soc svg{width:18px;height:18px;fill:var(--black);transition:fill .2s}

/* LINKS */
.links{display:flex;flex-direction:column;gap:9px;padding:16px 18px 0}
.link-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border:1.5px solid var(--border);border-radius:50px;font-size:13px;font-weight:600;color:var(--black);text-decoration:none;cursor:pointer;transition:border-color .2s,background .2s;letter-spacing:.03em}
.link-btn:hover{background:var(--gray)}
.link-btn svg{width:14px;height:14px;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:20px 18px 0}
.section-label{font-size:9.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

/* SERVICES */
.services-section{margin:22px 18px 0}
.serv-grid{display:flex;flex-direction:column;gap:8px}
.serv-card{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1.5px solid var(--border);border-radius:14px;transition:border-color .2s,box-shadow .2s}
.serv-card:hover{border-color:#ccc;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.serv-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.serv-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.serv-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--black);text-transform:uppercase;letter-spacing:.02em}
.serv-desc{font-size:11px;color:var(--muted);margin-top:1px;line-height:1.4}

/* INFO */
.info-list{padding:14px 18px 0;display:flex;flex-direction:column}
.info-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.i-icon{width:15px;height:15px;fill:none;stroke:var(--muted);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-top:2px}
.i-label{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.i-val{font-size:13px;color:var(--black);line-height:1.5}
.i-val a{color:var(--black);text-decoration:none}
.i-val a:hover{color:var(--red)}

/* ABOUT */
.about-section{margin:20px 18px 0;padding:16px;background:var(--gray);border-radius:14px}
.about-label{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.about-text{font-size:12.5px;color:#444;line-height:1.65}

/* FORM */
.form-section{padding:22px 18px 0}
.form-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--black);text-transform:uppercase;letter-spacing:.03em}
.form-sub{font-size:12px;color:var(--muted);margin-top:3px;margin-bottom:14px}
.form-field{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--black);background:white;margin-bottom:10px;outline:none;transition:border-color .2s}
.form-field:focus{border-color:var(--black)}
.form-field::placeholder{color:#bbb}
.btn-submit{width:100%;padding:15px;color:white;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-top:2px;transition:opacity .2s,transform .15s}
.btn-submit:hover{opacity:.9;transform:translateY(-1px)}
.form-legal{font-size:10px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.6;padding-bottom:24px}

/* STICKY */
.sticky-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;align-items:center;justify-content:space-between;padding:13px 20px;z-index:100;cursor:pointer;gap:10px;transition:opacity .2s}
.sticky-bar:hover{opacity:.9}
.sticky-logo{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:#333}
.sticky-logo img{width:32px;height:32px;object-fit:contain}
.sticky-label{flex:1;text-align:center;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:white;letter-spacing:.06em;text-transform:uppercase}
.sticky-icon{width:20px;height:20px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#222;color:#fff;font-size:13px;padding:10px 22px;border-radius:100px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* NOT FOUND */
.not-found{text-align:center;padding:80px 24px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.not-found h2{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--black);text-transform:uppercase;margin-bottom:12px}
.not-found p{font-size:14px;color:var(--muted);line-height:1.6}
</style>
</head>

<script>

function getIcon(type) {
  const icons = {
    grid: `<line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/><line x1="6" y1="3" x2="6" y2="21"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="18" y1="3" x2="18" y2="21"/>`,

    <!-- ACCIONES -->

        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

async function registrarVisita(tarjetaId) {
  const dispositivo = /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' :
                      /Tablet|iPad/i.test(navigator.userAgent) ? 'tablet' : 'desktop';
  const tipo = window.location.search.includes('qr') ? 'qr' : 'web';
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/visitas`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ tarjeta_id: tarjetaId, tipo, dispositivo }),
    });
  } catch(e) { console.log('Visita no registrada:', e) }
}

async function submitForm(tarjetaId, cardName) {
  const nombre  = document.getElementById('f-nombre').value.trim();
  const empresa = document.getElementById('f-empresa').value.trim();
  const email   = document.getElementById('f-email').value.trim();
  const celular = document.getElementById('f-celular').value.trim();
  if (!nombre || !email) { showToast('⚠ Completá nombre y email'); return; }
  try {
    if (tarjetaId !== 'demo') {
      await fetch(`${SUPABASE_URL}/rest/v1/contactos`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ tarjeta_id: tarjetaId, nombre, empresa, email, celular, estado: 'new' }),
      });
    }
    showToast('✓ ¡Gracias ' + nombre + '! Nos contactaremos pronto.');
    document.getElementById('f-nombre').value = '';
    document.getElementById('f-empresa').value = '';
    document.getElementById('f-email').value = '';
    document.getElementById('f-celular').value = '';
  } catch(e) {
    showToast('✓ ¡Gracias ' + nombre + '!');
  }
}

function saveVCard() {
  const blob = new Blob([window._vcard], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (window._cardData?.nombre || 'contacto').replace(/\s+/g, '_') + '.vcf';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Contacto descargado');
}

function shareCard() {
  if (navigator.share) {
    navigator.share({ title: window._cardData?.nombre || 'Tarjeta Digital', url: window.location.href });
  } else {
    navigator.clipboard?.writeText(window.location.href);
    showToast('✓ Link copiado');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// INIT
loadCard();
</script>

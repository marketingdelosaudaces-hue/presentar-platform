<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PresentAR — Tarjeta Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#1a1a1a;--white:#ffffff;--gray:#f5f5f5;--muted:#888;--border:#e4e4e4}
body{background:#d0d0d0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;font-family:'Nunito',sans-serif;padding-bottom:80px}
.card{width:100%;max-width:430px;background:var(--white);min-height:100vh;animation:up .5s cubic-bezier(.22,1,.36,1) both;position:relative}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.loading-screen{position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s}
.loading-screen.hide{opacity:0;pointer-events:none}
.loading-logo{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;color:white;margin-bottom:16px}
.loading-logo span{color:#e8192c}
.loading-bar{width:200px;height:3px;background:#333;border-radius:3px;overflow:hidden}
.loading-fill{height:100%;background:#e8192c;border-radius:3px;animation:fill 1.2s ease forwards}
@keyframes fill{from{width:0}to{width:100%}}
.cover{position:relative;height:210px;overflow:hidden;background:linear-gradient(135deg,#1a1a1a,#2d1010)}
.cover img{width:100%;height:100%;object-fit:cover;display:block}
.cover-default{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:64px}
.avatar-wrap{display:flex;justify-content:center;margin-top:-52px;position:relative;z-index:10}
.avatar{width:104px;height:104px;border-radius:50%;border:4px solid white;background:#1a1a1a;object-fit:contain;padding:6px;box-shadow:0 6px 24px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;color:white;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:contain}
.identity{text-align:center;padding:14px 24px 0}
.identity h1{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--black);letter-spacing:.04em;text-transform:uppercase}
.identity .role{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;letter-spacing:.1em;text-transform:uppercase}
.identity .tagline{font-size:13px;color:#555;font-weight:400;margin-top:10px;line-height:1.55;padding:0 8px;font-style:italic}
.certs{display:flex;justify-content:center;gap:8px;padding:14px 18px 0;flex-wrap:wrap}
.cert-badge{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--gray);border-radius:20px;font-size:10.5px;font-weight:700;color:var(--black);letter-spacing:.04em}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 18px 0}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 10px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;cursor:pointer;border:none;text-decoration:none;transition:transform .15s,opacity .15s;color:white}
.btn:hover{transform:translateY(-1px);opacity:.9}
.btn-share{background:#1a1a1a}
.btn svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}
.agenda-wrap{padding:10px 18px 0}
.btn-agenda{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:50px;color:white;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;letter-spacing:.05em;cursor:pointer;text-decoration:none;transition:opacity .2s,transform .15s}
.btn-agenda:hover{opacity:.9;transform:translateY(-1px)}
.btn-agenda svg{width:16px;height:16px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.socials{display:flex;justify-content:center;gap:22px;padding:18px 18px 0}
.soc{width:44px;height:44px;border-radius:50%;background:var(--gray);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,transform .15s;text-decoration:none}
.soc:hover{background:#1a1a1a;transform:translateY(-2px)}
.soc:hover svg{fill:white}
.soc svg{width:18px;height:18px;fill:#1a1a1a;transition:fill .2s}
.links{display:flex;flex-direction:column;gap:9px;padding:16px 18px 0}
.link-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border:1.5px solid var(--border);border-radius:50px;font-size:13px;font-weight:600;color:var(--black);text-decoration:none;cursor:pointer;transition:border-color .2s,background .2s;letter-spacing:.03em}
.link-btn:hover{background:var(--gray)}
.link-btn svg{width:14px;height:14px;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:20px 18px 0}
.section-label{font-size:9.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.services-section{margin:22px 18px 0}
.serv-grid{display:flex;flex-direction:column;gap:8px}
.serv-card{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1.5px solid var(--border);border-radius:14px;transition:border-color .2s,box-shadow .2s}
.serv-card:hover{border-color:#ccc;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.serv-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.serv-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.serv-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--black);text-transform:uppercase;letter-spacing:.02em}
.serv-desc{font-size:11px;color:var(--muted);margin-top:1px;line-height:1.4}
.info-list{padding:14px 18px 0;display:flex;flex-direction:column}
.info-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.i-icon{width:15px;height:15px;fill:none;stroke:var(--muted);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-top:2px}
.i-label{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.i-val{font-size:13px;color:var(--black);line-height:1.5}
.i-val a{color:var(--black);text-decoration:none}
.i-val a:hover{color:#e8192c}
.about-section{margin:20px 18px 0;padding:16px;background:var(--gray);border-radius:14px}
.about-label{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.about-text{font-size:12.5px;color:#444;line-height:1.65}
.form-section{padding:22px 18px 0}
.form-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--black);text-transform:uppercase;letter-spacing:.03em}
.form-sub{font-size:12px;color:var(--muted);margin-top:3px;margin-bottom:14px}
.form-field{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--black);background:white;margin-bottom:10px;outline:none;transition:border-color .2s}
.form-field:focus{border-color:var(--black)}
.form-field::placeholder{color:#bbb}
.btn-submit{width:100%;padding:15px;color:white;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-top:2px;transition:opacity .2s,transform .15s}
.btn-submit:hover{opacity:.9;transform:translateY(-1px)}
.form-legal{font-size:10px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.6;padding-bottom:24px}
.sticky-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;align-items:center;justify-content:space-between;padding:13px 20px;z-index:100;cursor:pointer;gap:10px}
.sticky-bar:hover{opacity:.9}
.sticky-logo{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:rgba(255,255,255,.2)}
.sticky-label{flex:1;text-align:center;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:white;letter-spacing:.06em;text-transform:uppercase}
.sticky-icon{width:20px;height:20px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#222;color:#fff;font-size:13px;padding:10px 22px;border-radius:100px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.not-found{text-align:center;padding:80px 24px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.not-found h2{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--black);text-transform:uppercase;margin-bottom:12px}
.not-found p{font-size:14px;color:var(--muted);line-height:1.6}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="loading-logo">Present<span>AR</span></div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div class="card" id="card" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://eldiuxxqqxjpwjtrxqfg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsZGl1eHhxcXhqcHdqdHJ4cWZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODYwMjcsImV4cCI6MjA4OTE2MjAyN30.HX35eqm_x_Yz83gXEDZ9q8Bq9Qdwt1ZC2CgKh1NWLFA';

const params = new URLSearchParams(window.location.search);
const slug = params.get('slug') || 'maf-argentina';

async function loadCard() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tarjetas?slug=eq.${slug}&activa=eq.true&select=*`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const cards = await res.json();

    if (!cards || cards.length === 0) {
      // No encontrada — mostrar error
      document.getElementById('card').innerHTML = `
        <div class="not-found">
          <div style="font-size:48px;margin-bottom:16px">😕</div>
          <h2>Tarjeta no encontrada</h2>
          <p>No existe ninguna tarjeta con ese nombre.<br>Verificá la URL e intentá de nuevo.</p>
        </div>`;
    } else {
      const c = cards[0];
      // Parsear links
      let links = [];
      try { links = JSON.parse(c.links || '[]'); } catch { links = []; }
      renderCard(c, links);
      registrarVisita(c.id);
    }
  } catch(e) {
    document.getElementById('card').innerHTML = `
      <div class="not-found">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <h2>Error de conexión</h2>
        <p>No se pudo cargar la tarjeta.<br>Revisá tu conexión e intentá de nuevo.</p>
      </div>`;
  }

  setTimeout(() => {
    document.getElementById('loading').classList.add('hide');
    document.getElementById('card').style.display = 'block';
  }, 1200);
}

function renderCard(d, links) {
  const color  = d.color || '#e8192c';
  const ini    = (d.nombre || '').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const waNum  = (d.telefono || '').replace(/\D/g, '');
  const waLink = waNum ? `https://wa.me/${waNum}?text=Hola%20${encodeURIComponent(d.nombre || '')}%2C%20vi%20su%20tarjeta%20y%20quisiera%20consultar` : '#';
  const agLink = waNum ? `https://wa.me/${waNum}?text=Hola%20${encodeURIComponent(d.nombre || '')}%2C%20quisiera%20agendar%20una%20reuni%C3%B3n` : '#';

  const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${d.nombre||''}\nORG:${d.empresa||d.nombre||''}\nTITLE:${d.cargo||''}\nTEL;TYPE=CELL,PREF:${d.telefono||''}\nEMAIL;TYPE=INTERNET:${d.email||''}\nURL:${d.web||''}\nADR;TYPE=WORK:;;${d.direccion||''};;;\nEND:VCARD`;
  window._vcard   = vcard;
  window._cardData = d;

  // AVATAR
  const avatarHtml = d.logo_url
    ? `<div class="avatar" style="background:white;padding:4px"><img src="${d.logo_url}" alt="${d.nombre}"></div>`
    : `<div class="avatar" style="background:${color}">${ini}</div>`;

  // PORTADA
  const coverHtml = d.cover_url
    ? `<div class="cover"><img src="${d.cover_url}" alt="portada"></div>`
    : `<div class="cover"><div class="cover-default">🏢</div></div>`;

  // LINKS
  const linksHtml = links.filter(l => l.active).length > 0
    ? `<div class="links">${links.filter(l => l.active).map(l => `
        <a class="link-btn" href="${l.url}" target="_blank">
          <svg viewBox="0 0 24 24" style="stroke:${color}"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          ${l.label}
        </a>`).join('')}
      </div>` : '';

  // SOCIALS
  let socialsHtml = '';
  if (d.instagram || d.linkedin || d.web) {
    socialsHtml = `<div class="socials">
      ${d.instagram ? `<a class="soc" href="${d.instagram}" target="_blank"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>` : ''}
      ${d.linkedin ? `<a class="soc" href="${d.linkedin}" target="_blank"><svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></a>` : ''}
      ${d.web ? `<a class="soc" href="${d.web}" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></a>` : ''}
    </div>`;
  }

  // INFO
  let infoHtml = '';
  if (d.telefono || d.email || d.direccion || d.horarios) {
    infoHtml = `<div class="info-list">
      ${d.telefono ? `<div class="info-row"><svg class="i-icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 014.69 12 19.79 19.79 0 011.61 3.38 2 2 0 013.6 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L7.91 8.58a16 16 0 006 6l.96-.95a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg><div><div class="i-label">WhatsApp</div><div class="i-val"><a href="${waLink}">${d.telefono}</a></div></div></div>` : ''}
      ${d.email ? `<div class="info-row"><svg class="i-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><div><div class="i-label">Email</div><div class="i-val"><a href="mailto:${d.email}">${d.email}</a></div></div></div>` : ''}
      ${d.direccion ? `<div class="info-row"><svg class="i-icon" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><div><div class="i-label">Dirección</div><div class="i-val">${d.direccion}</div></div></div>` : ''}
      ${d.horarios ? `<div class="info-row"><svg class="i-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><div><div class="i-label">Horarios</div><div class="i-val">${d.horarios}</div></div></div>` : ''}
    </div>`;
  }

  // ABOUT
  const aboutHtml = d.about ? `
    <div class="about-section">
      <div class="about-label">Acerca de ${d.nombre}</div>
      <p class="about-text">${d.about}</p>
    </div>` : '';

  document.getElementById('card').innerHTML = `
    ${coverHtml}
    <div class="avatar-wrap">${avatarHtml}</div>
    <div class="identity">
      <h1>${d.nombre || ''}</h1>
      <div class="role">${d.cargo || ''}${d.empresa ? ' · ' + d.empresa : ''}</div>
      ${d.tagline ? `<p class="tagline">${d.tagline}</p>` : ''}
    </div>
    <div class="actions">
      <a class="btn" href="${waLink}" style="background:${color}">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp
      </a>
      <button class="btn btn-share" onclick="shareCard()">
        <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
        Compartir
      </button>
    </div>
    <div class="agenda-wrap">
      <a class="btn-agenda" href="${agLink}" style="background:${color}">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Agendar una Reunión
      </a>
    </div>
    ${socialsHtml}
    ${linksHtml}
    ${infoHtml ? '<div class="divider"></div>' + infoHtml : ''}
    ${aboutHtml}
    <div class="form-section">
      <div class="form-title">Compartinos tu contacto</div>
      <div class="form-sub">Completá tus datos para que podamos contactarte.</div>
      <input class="form-field" type="text" placeholder="Nombre" id="f-nombre">
      <input class="form-field" type="text" placeholder="Empresa" id="f-empresa">
      <input class="form-field" type="email" placeholder="Email" id="f-email">
      <input class="form-field" type="tel" placeholder="Celular" id="f-celular">
      <button class="btn-submit" style="background:${color}" onclick="submitForm('${d.id}','${d.nombre}')">Enviar</button>
      <p class="form-legal">Al completar mis datos, acepto recibir información de ${d.nombre}.</p>
    </div>
    <div class="sticky-bar" style="background:${color}" onclick="saveVCard()">
      <div class="sticky-logo"><span style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:white">${ini}</span></div>
      <span class="sticky-label">Guardar en Contactos</span>
      <svg class="sticky-icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    </div>`;
}

async function registrarVisita(id) {
  const disp = /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : /Tablet|iPad/i.test(navigator.userAgent) ? 'tablet' : 'desktop';
  const tipo = window.location.search.includes('qr') ? 'qr' : 'web';
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/visitas`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ tarjeta_id: id, tipo, dispositivo: disp }),
    });
  } catch(e) {}
}

async function submitForm(tarjetaId, nombre) {
  const n = document.getElementById('f-nombre').value.trim();
  const e = document.getElementById('f-empresa').value.trim();
  const m = document.getElementById('f-email').value.trim();
  const c = document.getElementById('f-celular').value.trim();
  if (!n || !m) { showToast('⚠ Completá nombre y email'); return; }
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/contactos`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ tarjeta_id: tarjetaId, nombre: n, empresa: e, email: m, celular: c, estado: 'new' }),
    });
    showToast('✓ ¡Gracias ' + n + '! Te contactamos pronto.');
    ['f-nombre','f-empresa','f-email','f-celular'].forEach(id => document.getElementById(id).value = '');
  } catch(e) {
    showToast('✓ ¡Gracias ' + n + '!');
  }
}

function saveVCard() {
  const blob = new Blob([window._vcard], { type: 'text/vcard' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = (window._cardData?.nombre || 'contacto').replace(/\s+/g, '_') + '.vcf';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Contacto descargado');
}

function shareCard() {
  if (navigator.share) navigator.share({ title: window._cardData?.nombre, url: window.location.href });
  else { navigator.clipboard?.writeText(window.location.href); showToast('✓ Link copiado'); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadCard();
</script>
